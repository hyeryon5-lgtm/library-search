<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>도서관 검색</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --border: rgba(255,255,255,0.07);
      --text: #f0f0f5;
      --text2: #9090a8;
      --text3: #5a5a72;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --green: #22c55e;
      --red: #f43f5e;
      --orange: #f97316;
      --purple: #a855f7;
      --blue: #3b82f6;
      --gold: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
    }

    /* ── 헤더 ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 0 20px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15,15,19,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      box-shadow: 0 4px 12px rgba(108,99,255,0.4);
    }

    .header-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-sub {
      font-size: 11px;
      color: var(--text3);
      margin-top: 1px;
    }

    .lib-dots {
      display: flex;
      gap: 5px;
    }

    .lib-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }

    /* ── 컨테이너 ── */
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    /* ── 카드 ── */
    .card {
      background: var(--surface);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── 텍스트 에어리어 ── */
    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 130px;
      transition: border-color 0.2s;
    }

    textarea::placeholder { color: var(--text3); }
    textarea:focus { border-color: rgba(108,99,255,0.5); }

    .field-hint {
      font-size: 12px;
      color: var(--text3);
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ── 버튼 ── */
    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 12px;
      transition: all 0.2s;
      letter-spacing: -0.2px;
    }

    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      box-shadow: 0 4px 20px rgba(108,99,255,0.35);
    }

    .btn-primary:hover { box-shadow: 0 6px 24px rgba(108,99,255,0.5); }

    .btn-success {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      box-shadow: 0 4px 20px rgba(34,197,94,0.3);
    }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text2);
      border: 1px solid var(--border);
    }

    /* ── 스피너 ── */
    .spinner {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }
    .spinner.show { display: block; }

    .spin-ring {
      width: 44px; height: 44px;
      border: 3px solid var(--surface2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .spin-text {
      font-size: 13px;
      color: var(--text2);
      font-weight: 500;
    }

    /* ── 책 확인 카드 ── */
    .verify-list { display: flex; flex-direction: column; gap: 10px; }

    .verify-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px;
      display: flex;
      gap: 13px;
      align-items: flex-start;
      transition: border-color 0.2s;
    }

    .verify-card.checked { border-color: rgba(108,99,255,0.3); }

    .vc-thumb {
      width: 52px; height: 72px;
      border-radius: 7px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .vc-thumb-empty {
      width: 52px; height: 72px;
      border-radius: 7px;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--surface), var(--surface2));
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .vc-info { flex: 1; min-width: 0; }

    .vc-query {
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 2px;
    }

    .vc-cleaned {
      font-size: 11px;
      color: var(--accent2);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .vc-title {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 3px;
    }

    .vc-author { font-size: 12px; color: var(--text2); }

    .vc-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 6px;
    }

    .vc-badge.found { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
    .vc-badge.notfound { background: var(--surface); color: var(--text3); border: 1px solid var(--border); }

    .vc-check {
      flex-shrink: 0;
      margin-top: 2px;
    }

    .vc-check input[type=checkbox] {
      width: 22px; height: 22px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    /* ── 도서관 결과 ── */
    .results-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    /* 요약 바 */
    .summary-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .sum-item {
      text-align: center;
      border-right: 1px solid var(--border);
      padding: 4px 0;
    }

    .sum-item:last-child { border-right: none; }

    .sum-num {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .sum-num.g { color: var(--green); }
    .sum-num.r { color: var(--red); }
    .sum-num.a { color: var(--text3); }

    .sum-label {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px;
      font-weight: 500;
    }

    /* 책별 그룹 */
    .book-group {
      margin-bottom: 24px;
    }

    .book-group-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .book-group-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .book-group-searched {
      font-size: 12px;
      color: var(--accent2);
      font-weight: 400;
    }

    /* 도서관 섹션 */
    .lib-block { margin-bottom: 10px; }

    .lib-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }

    .lib-pill {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 11px;
      border-radius: 20px;
      letter-spacing: 0.2px;
    }

    .lib-sungsan   { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.25); }
    .lib-gimhae    { background: rgba(249,115,22,0.15); color: #fb923c; border: 1px solid rgba(249,115,22,0.25); }
    .lib-masan     { background: rgba(34,197,94,0.15);  color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
    .lib-changwon  { background: rgba(168,85,247,0.15); color: #c084fc; border: 1px solid rgba(168,85,247,0.25); }

    /* 책 행 */
    .book-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 6px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      transition: border-color 0.2s;
    }

    .book-item.available { border-left: 3px solid var(--green); }
    .book-item.unavailable { border-left: 3px solid var(--red); }
    .book-item.empty {
      border-left: 3px solid var(--surface2);
      justify-content: center;
      padding: 10px 14px;
    }

    .book-item-info { flex: 1; min-width: 0; }

    .bi-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .bi-meta {
      font-size: 12px;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 2px;
    }

    .bi-meta-label {
      color: var(--text3);
      font-size: 11px;
      min-width: 44px;
    }

    .bi-status {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .status-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .status-badge.ok  { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
    .status-badge.ng  { background: rgba(244,63,94,0.15);  color: var(--red);   border: 1px solid rgba(244,63,94,0.25); }

    .empty-text {
      font-size: 12px;
      color: var(--text3);
      font-weight: 500;
    }

    /* ── 셀렉트 카운트 ── */
    .verify-count {
      font-size: 12px;
      color: var(--text3);
      font-weight: 400;
      margin-left: 6px;
    }

    /* ── 공통 ── */
    .hidden { display: none; }

    /* ── 애니메이션 ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fadein { animation: fadeUp 0.35s ease forwards; }

    /* ── 섹션 구분선 ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 6px 0 12px;
    }

    /* 스크롤바 */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ── 헤더 ── -->
<header>
  <div class="header-logo">
    <div class="logo-icon">📚</div>
    <div>
      <div class="header-title">도서관 검색</div>
      <div class="header-sub">성산 · 김해 · 마산 · 창원</div>
    </div>
  </div>
  <div class="lib-dots">
    <div class="lib-dot" style="background:#60a5fa"></div>
    <div class="lib-dot" style="background:#fb923c"></div>
    <div class="lib-dot" style="background:#4ade80"></div>
    <div class="lib-dot" style="background:#c084fc"></div>
  </div>
</header>

<div class="container">

  <!-- ── Step 1 ── -->
  <div id="step1">

    <div class="card fadein">
      <div class="card-title">📝 책 제목 입력</div>
      <textarea id="titlesInput"
        placeholder="Rain! &#10;The Weather Girls (Aki)&#10;I Am a Bunny (Richard Scarry)&#10;Old Bear (Kevin Henkes)&#10;&#10;한 줄에 제목 하나씩 ·  괄호 안 저자명은 자동 제거"></textarea>
      <div class="field-hint">✦ 괄호 안 저자명은 자동으로 제거되어 검색됩니다</div>
      <button class="btn btn-primary" onclick="verifyBooks()">제목 확인하기 →</button>
    </div>

  </div>

  <!-- ── 스피너 ── -->
  <div class="spinner" id="spinner">
    <div class="spin-ring"></div>
    <div class="spin-text" id="spinTxt">확인 중...</div>
  </div>

  <!-- ── Step 2: 책 확인 ── -->
  <div id="step2" class="hidden">
    <div class="card fadein">
      <div class="card-title">
        책 확인
        <span class="verify-count" id="verifyCount"></span>
      </div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:14px">Google Books에서 찾은 책이 맞는지 확인하세요.<br>아닌 책은 체크를 해제하세요.</p>
      <div class="verify-list" id="verifyList"></div>
      <button class="btn btn-success" onclick="searchLibrary()" style="margin-top:16px">도서관 검색하기 →</button>
      <button class="btn btn-ghost" onclick="goStep1()">다시 입력하기</button>
    </div>
  </div>

  <!-- ── Step 3: 도서관 결과 ── -->
  <div id="step3" class="hidden fadein">
    <div id="summaryBar"></div>
    <div id="libraryResults"></div>
    <button class="btn btn-ghost" onclick="goStep1()">← 처음으로</button>
  </div>

</div>

<script>
const LIBS = ['성산도서관','김해지혜의바다','마산지혜의바다','창원도서관'];
const LIB_COLOR = {
  '성산도서관':'lib-sungsan',
  '김해지혜의바다':'lib-gimhae',
  '마산지혜의바다':'lib-masan',
  '창원도서관':'lib-changwon'
};
const LIB_EMOJI = {'성산도서관':'🔵','김해지혜의바다':'🟠','마산지혜의바다':'🟢','창원도서관':'🟣'};

let verifiedBooks = [];

/* 제목 정제 - 저자명 등 부가정보 제거 */
function cleanTitle(t) {
  return t
    .replace(/^\d+\.\s*/, '')                 // 1. 숫자 목록 제거
    .replace(/\*\*/g, '')                     // **마크다운 볼드** 제거
    .replace(/\s*←.*$/, '')                   // ← 우측 주석 제거
    .replace(/\s*\([^)]*\)\s*/g, ' ')         // (저자명) 제거
    .replace(/\s*\[[^\]]*\]\s*/g, ' ')        // [부가정보] 제거
    .replace(/\s+-\s+[A-Z][^-]*$/, '')        // ' - Author Name' 끝 저자 제거
    .replace(/\s+[Bb]y\s+.+$/, '')            // ' by Author' 제거
    .replace(/\s*\/\s*[A-Z][A-Za-z\s]+$/, '') // ' / Author' 제거
    .replace(/\s+/g, ' ').trim() || t;
}

/* Step1 → Step2 */
async function verifyBooks() {
  const raw = document.getElementById('titlesInput').value.trim();
  if (!raw) return alert('제목을 입력해주세요.');
  const titles = raw.split('\n').map(t => t.trim()).filter(t => t);
  if (!titles.length) return alert('제목을 입력해주세요.');

  showSpinner('책 정보 확인 중...');

  verifiedBooks = await Promise.all(titles.map(async t => {
    const cleaned = cleanTitle(t);
    try {
      const url = `https://www.googleapis.com/books/v1/volumes?q=intitle:${encodeURIComponent(cleaned)}&maxResults=1&fields=items(volumeInfo(title,authors,imageLinks))`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.items?.length > 0) {
        const info = data.items[0].volumeInfo;
        return {
          query: t, cleaned,
          foundTitle: info.title || cleaned,
          foundAuthor: (info.authors || []).join(', '),
          thumb: info.imageLinks?.thumbnail || info.imageLinks?.smallThumbnail || '',
          found: true, checked: true
        };
      }
    } catch(e) {}
    return { query: t, cleaned, foundTitle: cleaned, foundAuthor: '', thumb: '', found: false, checked: true };
  }));

  renderStep2();
  hideSpinner();
}

function renderStep2() {
  document.getElementById('verifyList').innerHTML = verifiedBooks.map((b, i) => `
    <div class="verify-card ${b.checked ? 'checked' : ''}" id="vc${i}">
      <div class="vc-check">
        <input type="checkbox" ${b.checked ? 'checked' : ''}
          onchange="verifiedBooks[${i}].checked=this.checked; document.getElementById('vc${i}').className='verify-card '+(this.checked?'checked':''); updCount()">
      </div>
      ${b.thumb
        ? `<img class="vc-thumb" src="${esc(b.thumb)}" alt="cover" onerror="this.outerHTML='<div class=vc-thumb-empty>📖</div>'">`
        : `<div class="vc-thumb-empty">📖</div>`}
      <div class="vc-info">
        <div class="vc-query">입력: ${esc(b.query)}</div>
        ${b.query !== b.cleaned ? `<div class="vc-cleaned">→ 검색어: ${esc(b.cleaned)}</div>` : ''}
        <div class="vc-title">${esc(b.foundTitle)}</div>
        ${b.foundAuthor ? `<div class="vc-author">${esc(b.foundAuthor)}</div>` : ''}
        <span class="vc-badge ${b.found ? 'found' : 'notfound'}">${b.found ? '✓ 확인됨' : '미확인'}</span>
      </div>
    </div>`).join('');
  updCount();
  show('step2'); hide('step1'); hide('step3');
}

function updCount() {
  const c = verifiedBooks.filter(b => b.checked).length;
  document.getElementById('verifyCount').textContent = `${c} / ${verifiedBooks.length}권 선택`;
}

/* Step2 → Step3 */
async function searchLibrary() {
  const toSearch = verifiedBooks.filter(b => b.checked);
  if (!toSearch.length) return alert('검색할 책을 선택해주세요.');

  showSpinner('4개 도서관 검색 중...');
  hide('step2');

  const groups = await Promise.all(toSearch.map(async book => {
    try {
      const res = await fetch(`/api/search?title=${encodeURIComponent(book.cleaned)}`);
      const data = await res.json();
      return { book, data };
    } catch(e) {
      return { book, data: { error: '네트워크 오류' } };
    }
  }));

  /* 통계 */
  let totalOk = 0, totalNg = 0, totalNone = 0;
  groups.forEach(({ data }) => {
    if (!data.libraries) return;
    let hasAny = false;
    Object.values(data.libraries).forEach(arr => {
      if (arr.length > 0) hasAny = true;
      arr.forEach(b => b.available ? totalOk++ : totalNg++);
    });
    if (!hasAny) totalNone++;
  });

  /* 요약 */
  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-bar fadein">
      <div class="sum-item">
        <div class="sum-num g">${totalOk}</div>
        <div class="sum-label">대출가능</div>
      </div>
      <div class="sum-item">
        <div class="sum-num r">${totalNg}</div>
        <div class="sum-label">대출불가</div>
      </div>
      <div class="sum-item">
        <div class="sum-num a">${totalNone}</div>
        <div class="sum-label">미보유</div>
      </div>
    </div>`;

  /* 결과 */
  let html = '';
  for (const { book, data } of groups) {
    html += `<div class="book-group fadein">`;
    html += `<div class="book-group-header">
      <span class="book-group-title">${esc(book.query)}</span>
      ${book.query !== book.cleaned ? `<span class="book-group-searched">→ ${esc(book.cleaned)}</span>` : ''}
    </div>`;

    if (data.error) {
      html += `<div class="book-item empty"><span class="empty-text">⚠ ${esc(data.error)}</span></div>`;
    } else if (data.libraries) {
      LIBS.forEach(libName => {
        const arr = data.libraries[libName] || [];
        const colorClass = LIB_COLOR[libName] || '';
        html += `<div class="lib-block">
          <div class="lib-header">
            <span class="lib-pill ${colorClass}">${LIB_EMOJI[libName]} ${esc(libName)}</span>
          </div>`;
        if (arr.length === 0) {
          html += `<div class="book-item empty"><span class="empty-text">보유 자료 없음</span></div>`;
        } else {
          arr.forEach(b => {
            html += `
              <div class="book-item ${b.available ? 'available' : 'unavailable'}">
                <div class="book-item-info">
                  <div class="bi-title">${esc(b.title)}</div>
                  ${b.callNo ? `<div class="bi-meta"><span class="bi-meta-label">청구기호</span>${esc(b.callNo)}</div>` : ''}
                  ${b.shelfLoc ? `<div class="bi-meta"><span class="bi-meta-label">자료실</span>${esc(b.shelfLoc)}</div>` : ''}
                </div>
                <div class="bi-status">
                  <span class="status-badge ${b.available ? 'ok' : 'ng'}">${b.available ? '대출가능' : '대출불가'}</span>
                </div>
              </div>`;
          });
        }
        html += `</div>`;
      });
    }
    html += `</div>`;
  }

  document.getElementById('libraryResults').innerHTML = html;
  hideSpinner();
  show('step3');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goStep1() {
  show('step1'); hide('step2'); hide('step3');
  verifiedBooks = [];
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }
function showSpinner(t) { document.getElementById('spinTxt').textContent = t; document.getElementById('spinner').classList.add('show'); }
function hideSpinner() { document.getElementById('spinner').classList.remove('show'); }
function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>

</html>
