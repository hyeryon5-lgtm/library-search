<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>도서관 검색</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #1a1a22;
      --surface2: #22222e;
      --border: rgba(255,255,255,0.07);
      --text: #f0f0f5;
      --text2: #9090a8;
      --text3: #5a5a72;
      --accent: #6c63ff;
      --accent2: #a78bfa;
      --green: #22c55e;
      --red: #f43f5e;
      --orange: #f97316;
      --purple: #a855f7;
      --blue: #3b82f6;
      --gold: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
    }

    /* ── 헤더 ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 0 20px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(15,15,19,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      box-shadow: 0 4px 12px rgba(108,99,255,0.4);
    }

    .header-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-sub {
      font-size: 11px;
      color: var(--text3);
      margin-top: 1px;
    }

    .lib-dots {
      display: flex;
      gap: 5px;
    }

    .lib-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }

    /* ── 컨테이너 ── */
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    /* ── 카드 ── */
    .card {
      background: var(--surface);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .card-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── 텍스트 에어리어 ── */
    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 130px;
      transition: border-color 0.2s;
    }

    textarea::placeholder { color: var(--text3); }
    textarea:focus { border-color: rgba(108,99,255,0.5); }

    .field-hint {
      font-size: 12px;
      color: var(--text3);
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ── 버튼 ── */
    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 12px;
      transition: all 0.2s;
      letter-spacing: -0.2px;
    }

    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      box-shadow: 0 4px 20px rgba(108,99,255,0.35);
    }

    .btn-primary:hover { box-shadow: 0 6px 24px rgba(108,99,255,0.5); }

    .btn-success {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      box-shadow: 0 4px 20px rgba(34,197,94,0.3);
    }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text2);
      border: 1px solid var(--border);
    }

    /* ── 스피너 ── */
    .spinner {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }
    .spinner.show { display: block; }

    .spin-ring {
      width: 44px; height: 44px;
      border: 3px solid var(--surface2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .spin-text {
      font-size: 13px;
      color: var(--text2);
      font-weight: 500;
    }

    /* ── 책 확인 (멀티소스) ── */
    .verify-list { display: flex; flex-direction: column; gap: 14px; }

    .verify-group {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .vg-query {
      font-size: 12px;
      color: var(--text3);
      padding: 10px 14px 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .vg-query-label {
      font-size: 10px;
      font-weight: 700;
      background: var(--surface);
      color: var(--text3);
      padding: 2px 7px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .vg-query-text { color: var(--text2); font-weight: 500; }

    .vg-cleaned {
      font-size: 11px;
      color: var(--accent2);
    }

    .vg-options { display: flex; flex-direction: column; }

    .vg-option {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }

    .vg-option:last-child { border-bottom: none; }
    .vg-option:active { background: rgba(255,255,255,0.03); }

    .vg-option.selected {
      background: rgba(108,99,255,0.07);
      border-left: 3px solid var(--accent);
    }

    .vg-option.notfound { opacity: 0.45; cursor: default; }

    .vg-radio {
      font-size: 18px;
      flex-shrink: 0;
      color: var(--accent);
      width: 20px;
      text-align: center;
      line-height: 1;
    }

    .vg-option.notfound .vg-radio { color: var(--text3); }

    .vc-thumb {
      width: 44px; height: 60px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .vc-thumb-empty {
      width: 44px; height: 60px;
      border-radius: 6px;
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--text3);
    }

    .vc-info { flex: 1; min-width: 0; }

    .vg-source-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 5px;
      letter-spacing: 0.2px;
    }

    .src-google  { background: rgba(66,133,244,0.15);  color: #60a5fa; border: 1px solid rgba(66,133,244,0.25); }
    .src-openlib { background: rgba(249,115,22,0.15);  color: #fb923c; border: 1px solid rgba(249,115,22,0.25); }
    .src-naver   { background: rgba(34,197,94,0.15);   color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }

    .vc-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.35;
      color: var(--text);
      margin-bottom: 2px;
    }

    .vc-author { font-size: 12px; color: var(--text2); }
    .vg-noresult { font-size: 12px; color: var(--text3); }

    /* ── 도서관 결과 ── */
    .results-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    /* 요약 바 */
    .summary-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    .sum-item {
      text-align: center;
      border-right: 1px solid var(--border);
      padding: 4px 0;
    }

    .sum-item:last-child { border-right: none; }

    .sum-num {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .sum-num.g { color: var(--green); }
    .sum-num.r { color: var(--red); }
    .sum-num.a { color: var(--text3); }

    .sum-label {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px;
      font-weight: 500;
    }

    /* 도서관 그룹 */
    .lib-group {
      margin-bottom: 28px;
    }

    .lib-group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .lib-pill {
      font-size: 12px;
      font-weight: 700;
      padding: 5px 13px;
      border-radius: 20px;
      letter-spacing: 0.2px;
    }

    .lib-count {
      font-size: 12px;
      color: var(--text3);
      font-weight: 400;
    }

    .lib-sungsan   { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.25); }
    .lib-gimhae    { background: rgba(249,115,22,0.15); color: #fb923c; border: 1px solid rgba(249,115,22,0.25); }
    .lib-masan     { background: rgba(34,197,94,0.15);  color: #4ade80; border: 1px solid rgba(34,197,94,0.25); }
    .lib-changwon  { background: rgba(168,85,247,0.15); color: #c084fc; border: 1px solid rgba(168,85,247,0.25); }

    /* 책 행 */
    .book-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 12px;
      margin-bottom: 6px;
      display: flex;
      align-items: flex-start;
      gap: 11px;
      transition: border-color 0.2s;
    }

    .book-item.available { border-left: 3px solid var(--green); }
    .book-item.unavailable { border-left: 3px solid var(--red); }
    .book-item.empty {
      border-left: 3px solid var(--surface2);
      justify-content: center;
      padding: 10px 14px;
    }

    .bi-thumb {
      width: 44px;
      height: 60px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .bi-thumb-empty {
      width: 44px;
      height: 60px;
      border-radius: 6px;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--surface), var(--surface2));
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .book-item-info { flex: 1; min-width: 0; }

    .bi-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .bi-meta {
      font-size: 12px;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 2px;
    }

    .bi-meta-label {
      color: var(--text3);
      font-size: 11px;
      min-width: 44px;
    }

    .bi-status {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      padding-top: 2px;
    }

    .status-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .status-badge.ok  { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
    .status-badge.ng  { background: rgba(244,63,94,0.15);  color: var(--red);   border: 1px solid rgba(244,63,94,0.25); }

    .empty-text {
      font-size: 12px;
      color: var(--text3);
      font-weight: 500;
    }

    /* ── 셀렉트 카운트 ── */
    .verify-count {
      font-size: 12px;
      color: var(--text3);
      font-weight: 400;
      margin-left: 6px;
    }

    /* ── 공통 ── */
    .hidden { display: none; }

    /* ── 애니메이션 ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fadein { animation: fadeUp 0.35s ease forwards; }

    /* ── 섹션 구분선 ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 6px 0 12px;
    }

    /* 스크롤바 */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ── 헤더 ── -->
<header>
  <div class="header-logo">
    <div class="logo-icon">📚</div>
    <div>
      <div class="header-title">도서관 검색</div>
      <div class="header-sub">성산 · 김해 · 마산 · 창원</div>
    </div>
  </div>
  <div class="lib-dots">
    <div class="lib-dot" style="background:#60a5fa"></div>
    <div class="lib-dot" style="background:#fb923c"></div>
    <div class="lib-dot" style="background:#4ade80"></div>
    <div class="lib-dot" style="background:#c084fc"></div>
  </div>
</header>

<div class="container">

  <!-- ── Step 1 ── -->
  <div id="step1">

    <div class="card fadein">
      <div class="card-title">📝 책 제목 입력</div>
      <textarea id="titlesInput"
        placeholder="Rain! &#10;The Weather Girls (Aki)&#10;I Am a Bunny (Richard Scarry)&#10;Old Bear (Kevin Henkes)&#10;&#10;한 줄에 제목 하나씩 ·  괄호 안 저자명은 자동 제거"></textarea>
      <div class="field-hint">✦ 괄호 안 저자명은 자동으로 제거되어 검색됩니다</div>
      <button class="btn btn-primary" onclick="verifyBooks()">제목 확인하기 →</button>
    </div>

  </div>

  <!-- ── 스피너 ── -->
  <div class="spinner" id="spinner">
    <div class="spin-ring"></div>
    <div class="spin-text" id="spinTxt">확인 중...</div>
  </div>

  <!-- ── Step 2: 책 확인 ── -->
  <div id="step2" class="hidden">
    <div class="card fadein">
      <div class="card-title">
        책 확인
        <span class="verify-count" id="verifyCount"></span>
      </div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:14px">Google Books에서 찾은 책이 맞는지 확인하세요.<br>아닌 책은 체크를 해제하세요.</p>
      <div class="verify-list" id="verifyList"></div>
      <button class="btn btn-success" onclick="searchLibrary()" style="margin-top:16px">도서관 검색하기 →</button>
      <button class="btn btn-ghost" onclick="goStep1()">다시 입력하기</button>
    </div>
  </div>

  <!-- ── Step 3: 도서관 결과 ── -->
  <div id="step3" class="hidden fadein">
    <div id="summaryBar"></div>
    <div id="libraryResults"></div>
    <button class="btn btn-ghost" onclick="goStep1()">← 처음으로</button>
  </div>

</div>

<script>
const LIBS = ['성산도서관','김해지혜의바다','마산지혜의바다','창원도서관'];
const LIB_COLOR = {
  '성산도서관':'lib-sungsan',
  '김해지혜의바다':'lib-gimhae',
  '마산지혜의바다':'lib-masan',
  '창원도서관':'lib-changwon'
};
const LIB_EMOJI = {'성산도서관':'🔵','김해지혜의바다':'🟠','마산지혜의바다':'🟢','창원도서관':'🟣'};

let verifiedBooks = [];

/* 제목 정제 - 저자명 등 부가정보 제거 */
function cleanTitle(t) {
  return t
    .replace(/^\d+\.\s*/, '')                 // 1. 숫자 목록 제거
    .replace(/\*\*/g, '')                     // **마크다운 볼드** 제거
    .replace(/\s*←.*$/, '')                   // ← 우측 주석 제거
    .replace(/\s*\([^)]*\)\s*/g, ' ')         // (저자명) 제거
    .replace(/\s*\[[^\]]*\]\s*/g, ' ')        // [부가정보] 제거
    .replace(/\s+-\s+[A-Z][^-]*$/, '')        // ' - Author Name' 끝 저자 제거
    .replace(/\s+[Bb]y\s+.+$/, '')            // ' by Author' 제거
    .replace(/\s*\/\s*[A-Z][A-Za-z\s]+$/, '') // ' / Author' 제거
    .replace(/\s+/g, ' ').trim() || t;
}

/* Step1 → Step2 */
async function verifyBooks() {
  const raw = document.getElementById('titlesInput').value.trim();
  if (!raw) return alert('제목을 입력해주세요.');
  const titles = raw.split('\n').map(t => t.trim()).filter(t => t);
  if (!titles.length) return alert('제목을 입력해주세요.');

  showSpinner('책 정보 확인 중...');

  const SOURCE_KEYS  = ['google', 'openlib', 'naver'];
  const SOURCE_NAMES = { google: 'Google Books', openlib: 'Open Library', naver: '네이버 책' };

  verifiedBooks = await Promise.all(titles.map(async t => {
    const cleaned = cleanTitle(t);
    try {
      const res  = await fetch(`/api/books?title=${encodeURIComponent(cleaned)}`);
      const data = await res.json();
      const results = SOURCE_KEYS.map(key => {
        const r = data[key];
        return r ? { source: SOURCE_NAMES[key], key, ...r, found: true }
                 : { source: SOURCE_NAMES[key], key, found: false, foundTitle: '', foundAuthor: '', thumb: '' };
      });
      const firstFound = results.findIndex(r => r.found);
      return { query: t, cleaned, results, selectedIdx: firstFound };
    } catch(e) {}
    return {
      query: t, cleaned,
      results: SOURCE_KEYS.map(key => ({ source: SOURCE_NAMES[key], key, found: false, foundTitle: '', foundAuthor: '', thumb: '' })),
      selectedIdx: -1,
    };
  }));

  renderStep2();
  hideSpinner();
}

const SRC_CLASS = { 'Google Books': 'src-google', 'Open Library': 'src-openlib', '네이버 책': 'src-naver' };

function renderStep2() {
  document.getElementById('verifyList').innerHTML = verifiedBooks.map((b, i) => `
    <div class="verify-group" id="vg${i}">
      <div class="vg-query">
        <span class="vg-query-label">입력</span>
        <span class="vg-query-text">${esc(b.query)}</span>
        ${b.query !== b.cleaned ? `<span class="vg-cleaned">→ ${esc(b.cleaned)}</span>` : ''}
      </div>
      <div class="vg-options">
        ${b.results.map((r, j) => `
          <div class="vg-option ${b.selectedIdx === j ? 'selected' : ''} ${!r.found ? 'notfound' : ''}"
               id="vgo${i}_${j}" onclick="selectSource(${i},${j})">
            <div class="vg-radio">${b.selectedIdx === j ? '●' : '○'}</div>
            ${r.found && r.thumb
              ? `<img class="vc-thumb" src="${esc(r.thumb)}" alt="cover" onerror="this.outerHTML='<div class=vc-thumb-empty>📖</div>'">`
              : `<div class="vc-thumb-empty">${r.found ? '📖' : '—'}</div>`}
            <div class="vc-info">
              <div class="vg-source-badge ${SRC_CLASS[r.source] || ''}">${esc(r.source)}</div>
              ${r.found
                ? `<div class="vc-title">${esc(r.foundTitle)}</div>
                   ${r.foundAuthor ? `<div class="vc-author">${esc(r.foundAuthor)}</div>` : ''}`
                : `<div class="vg-noresult">검색 결과 없음</div>`}
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
  updCount();
  show('step2'); hide('step1'); hide('step3');
}

function selectSource(bi, si) {
  const b = verifiedBooks[bi];
  if (!b.results[si]?.found) return;
  b.selectedIdx = b.selectedIdx === si ? -1 : si;
  document.querySelectorAll(`#vg${bi} .vg-option`).forEach((el, j) => {
    el.classList.toggle('selected', j === b.selectedIdx);
    el.querySelector('.vg-radio').textContent = j === b.selectedIdx ? '●' : '○';
  });
  updCount();
}

function updCount() {
  const c = verifiedBooks.filter(b => b.selectedIdx >= 0).length;
  document.getElementById('verifyCount').textContent = `${c} / ${verifiedBooks.length}권 선택`;
}

/* Step2 → Step3 */
async function searchLibrary() {
  const toSearch = verifiedBooks.filter(b => b.selectedIdx >= 0);
  if (!toSearch.length) return alert('검색할 책을 선택해주세요.');

  showSpinner('4개 도서관 검색 중...');
  hide('step2');

  const groups = await Promise.all(toSearch.map(async book => {
    const selected = book.results[book.selectedIdx];
    const searchTitle = selected?.foundTitle || book.cleaned;
    const thumb = selected?.thumb || '';
    try {
      const res = await fetch(`/api/search?title=${encodeURIComponent(searchTitle)}`);
      const data = await res.json();
      return { book, data, thumb };
    } catch(e) {
      return { book, data: { error: '네트워크 오류' }, thumb };
    }
  }));

  /* 통계 */
  let totalOk = 0, totalNg = 0, totalNone = 0;
  groups.forEach(({ data }) => {
    if (!data.libraries) return;
    let hasAny = false;
    Object.values(data.libraries).forEach(arr => {
      if (arr.length > 0) hasAny = true;
      arr.forEach(b => b.available ? totalOk++ : totalNg++);
    });
    if (!hasAny) totalNone++;
  });

  /* 요약 */
  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-bar fadein">
      <div class="sum-item">
        <div class="sum-num g">${totalOk}</div>
        <div class="sum-label">대출가능</div>
      </div>
      <div class="sum-item">
        <div class="sum-num r">${totalNg}</div>
        <div class="sum-label">대출불가</div>
      </div>
      <div class="sum-item">
        <div class="sum-num a">${totalNone}</div>
        <div class="sum-label">미보유</div>
      </div>
    </div>`;

  /* 도서관별로 재구성 */
  const libData = {};
  LIBS.forEach(lib => libData[lib] = []);

  groups.forEach(({ data, thumb }) => {
    if (!data.libraries) return;
    LIBS.forEach(libName => {
      (data.libraries[libName] || []).forEach(item => {
        if (item.available) {
          libData[libName].push({ ...item, bookThumb: thumb });
        }
      });
    });
  });

  /* 각 도서관 내 청구기호 오름차순 정렬 */
  LIBS.forEach(lib => {
    libData[lib].sort((a, b) => (a.callNo || '').localeCompare(b.callNo || ''));
  });

  /* 결과 렌더링 */
  let html = '';
  LIBS.forEach(libName => {
    const items = libData[libName];
    const colorClass = LIB_COLOR[libName] || '';
    html += `<div class="lib-group fadein">`;
    html += `<div class="lib-group-header">
      <span class="lib-pill ${colorClass}">${LIB_EMOJI[libName]} ${esc(libName)}</span>
      <span class="lib-count">${items.length > 0 ? items.length + '권 대출가능' : '대출가능 없음'}</span>
    </div>`;

    if (items.length === 0) {
      html += `<div class="book-item empty"><span class="empty-text">대출가능 항목 없음</span></div>`;
    } else {
      items.forEach(b => {
        const thumbHtml = b.bookThumb
          ? `<img class="bi-thumb" src="${esc(b.bookThumb)}" alt="cover" onerror="this.outerHTML='<div class=bi-thumb-empty>📖</div>'">`
          : `<div class="bi-thumb-empty">📖</div>`;
        html += `
          <div class="book-item available">
            ${thumbHtml}
            <div class="book-item-info">
              <div class="bi-title">${esc(b.title)}</div>
              ${b.callNo ? `<div class="bi-meta"><span class="bi-meta-label">청구기호</span>${esc(b.callNo)}</div>` : ''}
              ${b.shelfLoc ? `<div class="bi-meta"><span class="bi-meta-label">자료실</span>${esc(b.shelfLoc)}</div>` : ''}
            </div>
            <div class="bi-status">
              <span class="status-badge ok">대출가능</span>
            </div>
          </div>`;
      });
    }
    html += `</div>`;
  });

  document.getElementById('libraryResults').innerHTML = html;
  hideSpinner();
  show('step3');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goStep1() {
  show('step1'); hide('step2'); hide('step3');
  verifiedBooks = [];
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }
function showSpinner(t) { document.getElementById('spinTxt').textContent = t; document.getElementById('spinner').classList.add('show'); }
function hideSpinner() { document.getElementById('spinner').classList.remove('show'); }
function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
